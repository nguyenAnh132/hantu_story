server:
  port: ${POST_SERVER_PORT:8082}
  servlet:
    context-path: /post

spring:
  application:
    name: post_service
  mongodb:
    # Spring Boot 4 uses spring.mongodb.* for core Mongo connection properties.
    uri: ${MONGODB_URI:mongodb://mongodb:27017}
    database: ${MONGODB_DATABASE:hantu_post_service}

app:
  services:
    profile: ${PROFILE_SERVICE_CONTEXT_URL:http://localhost:8081/profile}
