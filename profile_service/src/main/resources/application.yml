server:
  port: ${PROFILE_SERVER_PORT:8081}
  servlet:
    context-path: /profile

spring:
  application:
    name: profile_service
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:neo4j}

app:
  services:
    identity: ${IDENTITY_SERVICE_URL:http://localhost:9090}
    file: ${FILE_SERVICE_CONTEXT_URL:http://localhost:8083/file}
